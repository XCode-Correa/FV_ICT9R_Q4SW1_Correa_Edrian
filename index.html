<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-size: cover;
            background-repeat: repeat;
            background-position: center;
            background-attachment: fixed;
            background-color: rgb(34, 34, 34);
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100vh; 
        }
        img{
            height: 60px;
            width: 60px;
        }
        .custom-gradient{
            background-image: linear-gradient(to right, #000000, #00323b);
        }
        .fs-7{
            font-size: 14px;
        }
        .fs-8{
            font-size: 15px;
        }
        .fs-9{
            font-size: 12px;
        }
        .pt-6 {
            padding-top: 65px;
        }
    </style>
</head>
<body>

<div style="background-color: rgba(255, 255, 255, 0.5); width: 450px; border-radius: 30px;" class="container text-dark p-3">
    <div class="text-center">
        <h1 class="fw-bold">Log In</h1>
    </div>

    <br>

    <div class="text-center">
        <label class="form-label fs-9 fw-bold bg-dark text-light p-1 my-1" style="border-radius: 20px;" for="username">Username</label>
	    <input type="text" id="username" class="form-control form-control-sm rounded-pill text-center" name="username" placeholder="Enter here" required>
    </div>

    <br>

    <div class="text-center">
        <label class="form-label fs-9 fw-bold bg-dark text-light p-1 my-1" style="border-radius: 20px;" for="password">Password</label>
	    <input type="password" id="password" class="form-control form-control-sm rounded-pill text-center" name="password" placeholder="*****" required>
    </div>

    <br>

    <div class="form-check d-flex align-items-center ps-0">
        <input type="checkbox" id="stay" class="form-check-input m-0 me-2" onchange="checkstay()">
        <label class="form-check-label fs-8 fw-bold" for="stay">Stay logged in.</label>
    </div>
    
    <p id="msg" class="fs-7 text-light" style="height: 20px; padding-left: 25px;"></p>

    <div class="text-center">
        <button style="width: 100px;" type="button" id="submit" name="submit" class="btn btn-dark rounded-pill" onclick="login()">Login</button>

        <a href="index.html"><button style="width: 100px;" type="button" id="submit" name="submit" class="btn btn-light rounded-pill">Cancel</button></a>
    </div>

    <div class="text-center">
        <hr class="w-100 mx-auto text-dark"> 
        <a href="forgot.html" class="text-light fs-8 text-decoration-underline">Forgot username / password?</a>
    </div>
</div>

<script>
    function login(){
        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;

        var correctuser = "user1"; // set username
        var correctpass = "1234"; // set password

        if (username === "" || password === ""){
            window.alert("Please input your username and password.");
        } 
        else if (username === correctuser && password === correctpass) {
            window.alert("Welcome " + username + "!");
        } 
        else {
            window.alert("Incorrect username and/or password.");
        }
    }
    function checkstay() {
        let isChecked = document.getElementById("stay").checked; 

        switch(isChecked) {
            case true:
                document.getElementById("msg").innerHTML = "<i>Your session will stay active in this device.</i>";
            break;

            case false:
                document.getElementById("msg").innerHTML = "";
            break;
        }
    }

</script>
</body>
</html>
